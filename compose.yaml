services:
  app:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_URL: http://localhost:${APP_PORT:-3100}
      APP_VERSION: ${APP_VERSION:-0.5.0}
      DATABASE_URL: postgresql://kinmu:kinmu@db:5432/kinmu
      NODE_ENV: production
      SESSION_SECRET: local-development-session-secret-change-me-123456
    ports:
      - "${APP_PORT:-3100}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((response) => { if (!response.ok) process.exit(1) }).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kinmu
      POSTGRES_PASSWORD: kinmu
      POSTGRES_USER: kinmu
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kinmu -d kinmu"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
